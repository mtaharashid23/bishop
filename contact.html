<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Dr. Michael Bishop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-dark bg-navy">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">DR. MICHAEL BISHOP</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="book.html">The Book</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="speaking.html">Speaking</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="resources.html">Resources</a></li>
                    <li class="nav-item"><a class="btn btn-academic-red ms-lg-3" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <section class="py-5">
        <div class="container py-5">
            <div class="row">
                <div class="col-lg-5">
                    <h2 class="text-navy fw-bold mb-4">Let's Discuss Your Leadership Goals</h2>
                    <p class="lead mb-5">Whether you're looking for a keynote speaker, a leadership mentor, or a
                        district consultant, Dr. Bishop is ready to help.</p>

                    <div class="mb-4">
                        <h6 class="text-academic-red fw-bold">EMAIL</h6>
                        <p class="fs-5">mbishop@example.com</p>
                    </div>
                    <div class="mb-4">
                        <h6 class="text-academic-red fw-bold">PHONE</h6>
                        <p class="fs-5">(555) 000-0000</p>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="p-5 bg-light rounded shadow-sm">
                        <form>
                            <div class="row g-3">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Full Name</label>
                                    <input type="text" class="form-control" placeholder="Your Name">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Organization</label>
                                    <input type="text" class="form-control" placeholder="District or School">
                                </div>
                                <div class="col-12 mb-3">
                                    <label class="form-label fw-bold">Inquiry Type</label>
                                    <select class="form-select">
                                        <option>Speaking Engagement</option>
                                        <option>Consulting / Mentoring</option>
                                        <option>Book Inquiry</option>
                                        <option>Other</option>
                                    </select>
                                </div>
                                <div class="col-12 mb-4">
                                    <label class="form-label fw-bold">Message</label>
                                    <textarea class="form-control" rows="5"
                                        placeholder="Tell us about your event or needs..."></textarea>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-navy text-white btn-lg w-100">Send
                                        Inquiry</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
